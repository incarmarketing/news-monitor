<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>언론 정보 통합 데이터베이스</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #64748b;
      --line: #d9e2ef;
      --panel: #ffffff;
      --bg: #f4f7fb;
      --blue: #263b8f;
      --blue-soft: #e9eefc;
      --green: #16794c;
      --red: #be123c;
      --amber: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select {
      font: inherit;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      color: #15245a;
    }
    .nav-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: #15245a;
      padding: 8px 12px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn.primary {
      background: #15245a;
      border-color: #15245a;
      color: #fff;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 42px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-height: 104px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .metric-value {
      font-size: 30px;
      font-weight: 900;
      color: #15245a;
      line-height: 1;
    }
    .metric-label {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .controls {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      grid-template-columns: 1.7fr repeat(4, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .control {
      min-width: 0;
    }
    .control label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .control input,
    .control select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 8px 10px;
      color: var(--ink);
    }
    .insights {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .panel-title {
      margin: 0 0 12px;
      color: #15245a;
      font-size: 16px;
      font-weight: 900;
    }
    .bars {
      display: grid;
      gap: 10px;
    }
    .bar-row {
      display: grid;
      grid-template-columns: 82px 1fr 44px;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #edf2f7;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--blue);
      border-radius: inherit;
    }
    .result-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 18px 0 10px;
    }
    .result-count {
      color: var(--muted);
      font-weight: 800;
    }
    .articles {
      display: grid;
      gap: 10px;
    }
    .article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
    }
    .article-title {
      color: var(--ink);
      text-decoration: none;
      font-weight: 900;
      line-height: 1.45;
    }
    .article-title:hover {
      color: var(--blue);
      text-decoration: underline;
    }
    .meta {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: #fff;
    }
    .chip.own { background: #eef8f1; color: var(--green); border-color: #cbead5; }
    .chip.regulation { background: #fff7ed; color: var(--amber); border-color: #fed7aa; }
    .chip.competitor, .chip.industry { background: var(--blue-soft); color: #243b8f; border-color: #c8d5fb; }
    .chip.negative { background: #fff1f2; color: var(--red); border-color: #fecdd3; }
    .chip.positive { background: #eef8f1; color: var(--green); border-color: #cbead5; }
    .score {
      min-width: 56px;
      height: 56px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #15245a;
      font-weight: 900;
    }
    .score span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .empty {
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 28px;
      color: var(--muted);
      text-align: center;
      font-weight: 800;
    }
    @media (max-width: 860px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }
      .nav-actions {
        width: 100%;
        justify-content: stretch;
      }
      .btn {
        flex: 1 1 auto;
      }
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .control:first-child {
        grid-column: 1 / -1;
      }
      .insights {
        grid-template-columns: 1fr;
      }
      .article {
        grid-template-columns: 1fr;
      }
      .score {
        width: 100%;
        height: 44px;
        flex-direction: row;
        gap: 6px;
      }
    }
    @media (max-width: 520px) {
      h1 {
        font-size: 19px;
      }
      main {
        padding: 16px 12px 32px;
      }
      .summary-grid,
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="eyebrow">인카금융서비스 · 마케팅부</div>
        <h1>언론 정보 통합 데이터베이스</h1>
      </div>
      <div class="nav-actions">
        <a class="btn" href="./index.html">최신 보고서</a>
        <button class="btn" type="button" id="exportCsv">CSV 출력</button>
        <button class="btn primary" type="button" id="resetFilters">필터 초기화</button>
      </div>
    </div>
  </header>

  <main>
    <section class="summary-grid" aria-label="요약 지표">
      <div class="metric">
        <div class="metric-value" id="metricTotal">0</div>
        <div class="metric-label">누적 기사</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="metricOwn">0</div>
        <div class="metric-label">당사 보도</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="metricNegative">0</div>
        <div class="metric-label">부정 기사</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="metricRegulation">0</div>
        <div class="metric-label">규제/정책</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="metricDays">0</div>
        <div class="metric-label">수집 일수</div>
      </div>
    </section>

    <section class="controls" aria-label="기사 검색 필터">
      <div class="control">
        <label for="searchInput">검색어</label>
        <input id="searchInput" type="search" placeholder="제목, 키워드, 출처 검색">
      </div>
      <div class="control">
        <label for="dateFilter">기준일</label>
        <select id="dateFilter">
          <option value="">전체</option>
        </select>
      </div>
      <div class="control">
        <label for="categoryFilter">분류</label>
        <select id="categoryFilter">
          <option value="">전체</option>
        </select>
      </div>
      <div class="control">
        <label for="toneFilter">논조</label>
        <select id="toneFilter">
          <option value="">전체</option>
        </select>
      </div>
      <div class="control">
        <label for="riskFilter">리스크</label>
        <select id="riskFilter">
          <option value="">전체</option>
        </select>
      </div>
    </section>

    <section class="insights" aria-label="분포">
      <div class="panel">
        <h2 class="panel-title">분류별 분포</h2>
        <div class="bars" id="categoryBars"></div>
      </div>
      <div class="panel">
        <h2 class="panel-title">논조별 분포</h2>
        <div class="bars" id="toneBars"></div>
      </div>
    </section>

    <section aria-label="기사 목록">
      <div class="result-head">
        <h2 class="panel-title">기사 목록</h2>
        <div class="result-count" id="resultCount">0건</div>
      </div>
      <div class="articles" id="articleList"></div>
    </section>
  </main>

  <script>
    const state = {
      articles: [],
      filtered: [],
      categoryLabels: {},
      toneLabels: {},
      filters: {
        q: "",
        date: "",
        category: "",
        tone: "",
        risk: ""
      }
    };

    const categoryOrder = ["own", "regulation", "competitor", "industry", "other"];
    const toneOrder = ["negative", "neutral", "positive"];

    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[char]));

    const uniq = (items) => Array.from(new Set(items.filter(Boolean)));

    function optionList(select, values, labeler = (v) => v) {
      select.innerHTML = '<option value="">전체</option>';
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = labeler(value);
        select.appendChild(option);
      });
    }

    function initFilters(data) {
      optionList(document.getElementById("dateFilter"), uniq(data.articles.map((a) => a.date)).sort().reverse());
      optionList(
        document.getElementById("categoryFilter"),
        categoryOrder.filter((key) => data.articles.some((a) => a.category === key)),
        (key) => data.category_labels[key] || key
      );
      optionList(
        document.getElementById("toneFilter"),
        toneOrder.filter((key) => data.articles.some((a) => a.tone === key)),
        (key) => data.tone_labels[key] || key
      );
      optionList(document.getElementById("riskFilter"), uniq(data.articles.map((a) => a.risk)).sort());
    }

    function bindControls() {
      const map = {
        searchInput: "q",
        dateFilter: "date",
        categoryFilter: "category",
        toneFilter: "tone",
        riskFilter: "risk"
      };
      Object.entries(map).forEach(([id, key]) => {
        document.getElementById(id).addEventListener("input", (event) => {
          state.filters[key] = event.target.value.trim();
          render();
        });
      });
      document.getElementById("resetFilters").addEventListener("click", () => {
        Object.keys(state.filters).forEach((key) => state.filters[key] = "");
        Object.keys(map).forEach((id) => document.getElementById(id).value = "");
        render();
      });
      document.getElementById("exportCsv").addEventListener("click", exportCsv);
    }

    function applyFilters() {
      const query = state.filters.q.toLowerCase();
      state.filtered = state.articles.filter((article) => {
        const haystack = [article.title, article.keyword, article.source, article.category_label, article.tone_label]
          .join(" ")
          .toLowerCase();
        return (!query || haystack.includes(query))
          && (!state.filters.date || article.date === state.filters.date)
          && (!state.filters.category || article.category === state.filters.category)
          && (!state.filters.tone || article.tone === state.filters.tone)
          && (!state.filters.risk || article.risk === state.filters.risk);
      });
    }

    function renderMetrics() {
      const items = state.filtered;
      const categoryCounts = countBy(items, "category");
      const toneCounts = countBy(items, "tone");
      document.getElementById("metricTotal").textContent = items.length.toLocaleString("ko-KR");
      document.getElementById("metricOwn").textContent = (categoryCounts.own || 0).toLocaleString("ko-KR");
      document.getElementById("metricNegative").textContent = (toneCounts.negative || 0).toLocaleString("ko-KR");
      document.getElementById("metricRegulation").textContent = (categoryCounts.regulation || 0).toLocaleString("ko-KR");
      document.getElementById("metricDays").textContent = uniq(items.map((a) => a.date)).length.toLocaleString("ko-KR");
    }

    function countBy(items, key) {
      return items.reduce((acc, item) => {
        acc[item[key]] = (acc[item[key]] || 0) + 1;
        return acc;
      }, {});
    }

    function renderBars(targetId, counts, order, labels) {
      const target = document.getElementById(targetId);
      const max = Math.max(...Object.values(counts), 1);
      target.innerHTML = order
        .filter((key) => counts[key])
        .map((key) => `
          <div class="bar-row">
            <div>${escapeHtml(labels[key] || key)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.max(6, counts[key] / max * 100)}%"></div></div>
            <div>${counts[key]}</div>
          </div>
        `)
        .join("") || '<div class="empty">표시할 데이터가 없습니다.</div>';
    }

    function renderInsights() {
      renderBars("categoryBars", countBy(state.filtered, "category"), categoryOrder, state.categoryLabels);
      renderBars("toneBars", countBy(state.filtered, "tone"), toneOrder, state.toneLabels);
    }

    function renderArticles() {
      const target = document.getElementById("articleList");
      document.getElementById("resultCount").textContent = `${state.filtered.length.toLocaleString("ko-KR")}건`;
      if (!state.filtered.length) {
        target.innerHTML = '<div class="empty">조건에 맞는 기사가 없습니다.</div>';
        return;
      }
      target.innerHTML = state.filtered.map((article) => `
        <article class="article">
          <div>
            <a class="article-title" href="${escapeHtml(article.link)}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(article.title)}
            </a>
            <div class="meta">
              <span class="chip">${escapeHtml(article.date)}</span>
              <span class="chip ${escapeHtml(article.category)}">${escapeHtml(article.category_label)}</span>
              <span class="chip ${escapeHtml(article.tone)}">${escapeHtml(article.tone_label)}</span>
              <span class="chip">${escapeHtml(article.keyword || "키워드 없음")}</span>
              <span class="chip">${escapeHtml(article.source || "출처 없음")}</span>
              <span class="chip">묶음 ${escapeHtml(article.cluster_size)}건</span>
            </div>
          </div>
          <div class="score">${escapeHtml(article.score)}<span>score</span></div>
        </article>
      `).join("");
    }

    function render() {
      applyFilters();
      renderMetrics();
      renderInsights();
      renderArticles();
    }

    function exportCsv() {
      const headers = ["date", "category", "tone", "risk", "keyword", "source", "title", "link"];
      const rows = state.filtered.map((article) => headers.map((key) => {
        const value = String(article[key] ?? "").replace(/"/g, '""');
        return `"${value}"`;
      }).join(","));
      const csv = "\uFEFF" + [headers.join(","), ...rows].join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "news-monitor-articles.csv";
      link.click();
      URL.revokeObjectURL(link.href);
    }

    async function boot() {
      const response = await fetch("./data/articles.json", { cache: "no-store" });
      const data = await response.json();
      state.articles = data.articles || [];
      state.categoryLabels = data.category_labels || {};
      state.toneLabels = data.tone_labels || {};
      initFilters(data);
      bindControls();
      render();
    }

    boot().catch(() => {
      document.getElementById("articleList").innerHTML = '<div class="empty">데이터를 불러오지 못했습니다.</div>';
    });
  </script>
</body>
</html>
