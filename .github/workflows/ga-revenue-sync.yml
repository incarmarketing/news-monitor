name: GA Revenue Sync

on:
  workflow_dispatch:
    inputs:
      stand_mm:
        description: "Disclosure month, YYYYMM"
        required: false
        default: "202512"
      top:
        description: "Number of GA companies to collect"
        required: false
        default: "10"
      revenue_start_year:
        description: "First annual revenue year"
        required: false
        default: "2021"
      revenue_end_year:
        description: "Last annual revenue year"
        required: false
        default: "2025"
  push:
    branches:
      - main
    paths:
      - "refresh_ga_competitor_intel.py"
      - "supabase_store.py"
      - ".github/workflows/ga-revenue-sync.yml"
  schedule:
    - cron: "20 22 * * 0" # 07:20 KST Monday

permissions:
  contents: read

concurrency:
  group: ga-revenue-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Sync GA revenue metrics from public disclosure
        run: >
          python refresh_ga_competitor_intel.py
          --stand-mm "$GA_STAND_MM"
          --top "$GA_TOP"
          --revenue-start-year "$GA_REVENUE_START_YEAR"
          --revenue-end-year "$GA_REVENUE_END_YEAR"
        env:
          GA_STAND_MM: ${{ github.event.inputs.stand_mm || '202512' }}
          GA_TOP: ${{ github.event.inputs.top || '10' }}
          GA_REVENUE_START_YEAR: ${{ github.event.inputs.revenue_start_year || '2021' }}
          GA_REVENUE_END_YEAR: ${{ github.event.inputs.revenue_end_year || '2025' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
