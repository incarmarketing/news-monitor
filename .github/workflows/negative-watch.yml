name: Negative Article Watch

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Watch mode"
        required: false
        default: "single"
        type: choice
        options:
          - single
  repository_dispatch:
    types:
      - negative-watch
  schedule:
    - cron: "*/5 * * * *"

permissions:
  actions: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: negative-article-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest watch state
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Record watch start
        run: python job_ledger.py negative start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_PROVIDER: github_actions

      - name: Watch negative articles
        id: watch
        run: python negative_watch.py
        env:
          WATCH_MODE: ${{ github.event.inputs.mode || 'single' }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEGATIVE_WATCH_MINUTES: "5"
          NEGATIVE_WATCH_ALWAYS_ON: "true"
          NEGATIVE_WATCH_START_HOUR: "0"
          NEGATIVE_WATCH_END_HOUR: "23"
          NEGATIVE_WATCH_MAX_CATCHUP_MINUTES: "1440"
          NEGATIVE_WATCH_REQUIRE_DB_LOG: "true"
          NEGATIVE_WATCH_REQUIRE_ARTICLE_PERSIST: "true"
          NEGATIVE_WATCH_DASHBOARD_REFRESH: "throttled"
          NEGATIVE_WATCH_DASHBOARD_REFRESH_MINUTES: "15"

      - name: Persist sent alert state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d .watch-state ]; then
            git add -f .watch-state
          fi
          if git diff --cached --quiet; then
            echo "No watcher state changes to commit."
            exit 0
          fi
          git commit -m "Update negative watch state"
          git pull --rebase
          git push

      - name: Record watch finish
        if: always()
        run: python job_ledger.py negative finish --status "$JOB_STATUS"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_PROVIDER: github_actions
          JOB_STATUS: ${{ job.status }}

      - name: Refresh dashboard snapshot
        if: always() && steps.watch.outputs.should_refresh_dashboard == 'true'
        run: gh workflow run pages-dashboard.yml --ref main || echo "::warning::Dashboard refresh dispatch failed."
        env:
          GH_TOKEN: ${{ github.token }}
