name: Negative Article Watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0,30 * * * *"

permissions:
  contents: write

concurrency:
  group: negative-article-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest watch state
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Watch negative articles
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            for iteration in 1 2 3 4 5 6; do
              echo "::group::Negative watch iteration ${iteration}/6"
              python negative_watch.py
              echo "::endgroup::"
              if [ "$iteration" != "6" ]; then
                sleep 300
              fi
            done
          else
            python negative_watch.py
          fi
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEGATIVE_WATCH_MINUTES: "5"
          NEGATIVE_WATCH_ALWAYS_ON: "true"
          NEGATIVE_WATCH_START_HOUR: "0"
          NEGATIVE_WATCH_END_HOUR: "23"

      - name: Persist sent alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d .watch-state ]; then
            git add .watch-state
          fi
          if git diff --cached --quiet; then
            echo "No watcher state changes to commit."
            exit 0
          fi
          git commit -m "Update negative watch state"
          git pull --rebase
          git push
