name: Negative Article Watch

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Watch mode"
        required: false
        default: "single"
        type: choice
        options:
          - single
          - continuous
  repository_dispatch:
    types:
      - negative-watch
  schedule:
    - cron: "*/5 * * * *"

permissions:
  actions: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: negative-article-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest watch state
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Record watch start
        run: python job_ledger.py negative start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_PROVIDER: github_actions

      - name: Watch negative articles
        shell: bash
        run: |
          set -euo pipefail
          iterations=1
          if [ "${WATCH_MODE}" = "continuous" ]; then
            iterations=13
          fi
          for i in $(seq 1 "$iterations"); do
            echo "Negative watch iteration ${i}/${iterations}"
            python negative_watch.py
            if [ "$i" -lt "$iterations" ]; then
              sleep 300
            fi
          done
        env:
          WATCH_MODE: ${{ github.event.inputs.mode || 'single' }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEGATIVE_WATCH_MINUTES: "5"
          NEGATIVE_WATCH_ALWAYS_ON: "true"
          NEGATIVE_WATCH_START_HOUR: "0"
          NEGATIVE_WATCH_END_HOUR: "23"
          NEGATIVE_WATCH_MAX_CATCHUP_MINUTES: "1440"
          NEGATIVE_WATCH_REQUIRE_DB_LOG: "true"

      - name: Persist sent alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d .watch-state ]; then
            git add .watch-state
          fi
          if git diff --cached --quiet; then
            echo "No watcher state changes to commit."
            exit 0
          fi
          git commit -m "Update negative watch state"
          git pull --rebase
          git push

      - name: Record watch finish
        if: always()
        run: python job_ledger.py negative finish --status "$JOB_STATUS"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_PROVIDER: github_actions
          JOB_STATUS: ${{ job.status }}
