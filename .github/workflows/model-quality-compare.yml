name: Model Quality Compare

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "tools/model_quality_compare.py"
      - "groq_helper.py"
      - "ai_fallback.py"
      - ".github/workflows/model-quality-compare.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compare Gemini and Groq summary quality
        run: python tools/model_quality_compare.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          GROQ_ISSUE_MODEL: ${{ secrets.GROQ_ISSUE_MODEL || secrets.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          GEMINI_TIMEOUT_SECONDS: "45"
          GEMINI_ISSUE_MAX_TOKENS: "768"
          MODEL_QUALITY_STRICT: "0"

      - name: Upload comparison artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-quality-compare
          path: artifacts/model-quality-compare
          retention-days: 7
