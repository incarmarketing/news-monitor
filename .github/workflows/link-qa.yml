name: Link QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Public site root or dashboard URL"
        required: false
        default: "https://your-github-id.github.io/your-repo/"
  workflow_run:
    workflows:
      - Publish Dashboard
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: link-qa
  cancel-in-progress: true

jobs:
  public-link-check:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Inspect deployed report and notification links
        env:
          LINK_QA_BASE_URL: ${{ github.event.inputs.url || 'https://your-github-id.github.io/your-repo/' }}
          LINK_QA_REQUIRE_NOTIFICATIONS: "true"
        run: node frontend/scripts/link-qa.mjs

      - name: Upload link QA summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-qa
          path: .qa/links
