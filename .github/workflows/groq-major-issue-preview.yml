name: Groq Major Issue Preview

on:
  workflow_dispatch:
    inputs:
      issue_count:
        description: "Number of current major issues to summarize"
        required: false
        default: "5"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate Groq major issue preview
        run: python tools/groq_major_issue_preview.py --count "${{ github.event.inputs.issue_count || '5' }}"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL || 'llama-3.3-70b-versatile' }}

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: groq-major-issue-preview
          path: artifacts/groq-major-issue-preview
          retention-days: 7
