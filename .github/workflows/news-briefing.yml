name: AI News Briefing

on:
  workflow_dispatch:
    inputs:
      period_reports:
        description: "Generate period report preview"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - weekly
          - monthly
          - both
      send_slack:
        description: "Send Slack notification"
        required: true
        default: true
        type: boolean
      force_slack_send:
        description: "Force resend even when the same report was already sent"
        required: true
        default: false
        type: boolean
      report_slot:
        description: "Daily report slot for external cron calls"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - "07"
          - "08"
          - "13"
          - "18"
      backfill_only:
        description: "Archive missed slot without Pages deploy or notification send"
        required: true
        default: false
        type: boolean
      report_month:
        description: "Optional monthly report month, YYYY-MM"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "*/5 22 * * *" # 07:00-07:59 KST weekly/monthly reports only
    - cron: "*/5 23,0-14 * * *" # 08:00-23:59 KST daily report watchdog only

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REPORT_FAILURE_COOLDOWN_MINUTES: "30"
  REPORT_IN_PROGRESS_COOLDOWN_MINUTES: "20"
  GEMINI_CIRCUIT_HOURS: "6"
  GEMINI_CIRCUIT_CREDIT_HOURS: "24"

concurrency:
  group: news-briefing
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest archive state
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check schedule slot
        id: guard
        run: python schedule_guard.py begin
        env:
          SCHEDULE_CRON: ${{ github.event.schedule }}
          MANUAL_REPORT_SLOT: ${{ github.event.inputs.report_slot }}
          MANUAL_BACKFILL_ONLY: ${{ github.event.inputs.backfill_only }}
          FORCE_SLACK_SEND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_slack_send == 'true' && '1' || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Record report start
        if: steps.guard.outputs.should_run == 'true' && steps.guard.outputs.kst_hour != 'manual' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: python job_ledger.py report start
        env:
          REPORT_SLOT: ${{ steps.guard.outputs.kst_hour }}
          REPORT_BACKFILL_ONLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_only == 'true' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_PROVIDER: github_actions

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Build rebuilt dashboard
        if: steps.guard.outputs.should_run == 'true' && (github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_only != 'true'))
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Check Supabase write secret
        if: steps.guard.outputs.should_run == 'true' && steps.guard.outputs.should_period != 'true' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.period_reports == 'none') || contains(github.event.head_commit.message, '[send-slack]'))
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is missing. Daily reports would be sent without dashboard DB persistence."
            exit 1
          fi
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Generate briefing
        if: steps.guard.outputs.should_run == 'true' && steps.guard.outputs.should_period != 'true' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.period_reports == 'none') || contains(github.event.head_commit.message, '[send-slack]'))
        run: python run_once.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_REPORT_MODEL || secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GEMINI_PRO_MODEL: ${{ secrets.GEMINI_PRO_MODEL || secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GEMINI_REPORT_MODEL: ${{ secrets.GEMINI_REPORT_MODEL || secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GEMINI_FLASH_MODEL: ${{ secrets.GEMINI_FLASH_MODEL || 'gemini-2.5-flash' }}
          GEMINI_CONTEXT_MODEL: ${{ secrets.GEMINI_CONTEXT_MODEL || secrets.GEMINI_FLASH_MODEL || 'gemini-2.5-flash' }}
          GEMINI_ISSUE_MODEL: ${{ secrets.GEMINI_ISSUE_MODEL || secrets.GEMINI_FLASH_MODEL || 'gemini-2.5-flash' }}
          AI_CONTEXT_MAX_ARTICLES: ${{ secrets.AI_CONTEXT_MAX_ARTICLES || '18' }}
          AI_CONTEXT_PRO_REVIEW: "true"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          REPORT_SLOT: ${{ steps.guard.outputs.kst_hour }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          GROQ_MAX_ISSUE_SUMMARIES: ${{ secrets.GROQ_MAX_ISSUE_SUMMARIES || '20' }}
          AI_MAX_ISSUE_SUMMARIES: ${{ secrets.AI_MAX_ISSUE_SUMMARIES || '5' }}
          REPORT_BACKFILL_ONLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_only == 'true' }}

      - name: Generate period reports
        if: steps.guard.outputs.should_run == 'true' && (steps.guard.outputs.should_period == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.period_reports != 'none'))
        run: |
          PERIOD="${{ github.event.inputs.period_reports }}"
          REPORT_MONTH="${{ github.event.inputs.report_month }}"
          KST_WEEKDAY="$(TZ=Asia/Seoul date +%u)"
          KST_DAY="$(TZ=Asia/Seoul date +%d)"

          if [ "${{ steps.guard.outputs.should_period }}" = "true" ]; then
            if [ "$KST_WEEKDAY" = "1" ]; then
              python period_report.py weekly_previous
            else
              echo "Weekly report is only generated on Monday KST."
            fi
            if [ "$KST_DAY" = "01" ]; then
              python period_report.py monthly_previous
            else
              echo "Monthly report is only generated on the 1st KST."
            fi
            exit 0
          fi

          if [ "$PERIOD" = "weekly" ] || [ "$PERIOD" = "both" ]; then
            python period_report.py weekly
          fi
          if [ "$PERIOD" = "monthly" ] || [ "$PERIOD" = "both" ]; then
            if [ -n "$REPORT_MONTH" ]; then
              python period_report.py monthly "$REPORT_MONTH"
            else
              python period_report.py monthly
            fi
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_REPORT_MODEL || secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GEMINI_PRO_MODEL: ${{ secrets.GEMINI_PRO_MODEL || secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GEMINI_REPORT_MODEL: ${{ secrets.GEMINI_REPORT_MODEL || secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GEMINI_FLASH_MODEL: ${{ secrets.GEMINI_FLASH_MODEL || 'gemini-2.5-flash' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL || 'llama-3.3-70b-versatile' }}

      - name: Prepare static report
        if: steps.guard.outputs.should_run == 'true' && (github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_only != 'true'))
        run: python publish_report.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY || secrets.SUPABASE_PUBLISHABLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_REPORT_MODEL || secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GEMINI_PRO_MODEL: ${{ secrets.GEMINI_PRO_MODEL || secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GEMINI_REPORT_MODEL: ${{ secrets.GEMINI_REPORT_MODEL || secrets.GEMINI_MODEL || secrets.GEMINI_EDGE_MODEL || 'gemini-2.5-pro' }}
          GEMINI_FLASH_MODEL: ${{ secrets.GEMINI_FLASH_MODEL || 'gemini-2.5-flash' }}
          GEMINI_CONTEXT_MODEL: ${{ secrets.GEMINI_CONTEXT_MODEL || secrets.GEMINI_FLASH_MODEL || 'gemini-2.5-flash' }}
          GEMINI_ISSUE_MODEL: ${{ secrets.GEMINI_ISSUE_MODEL || secrets.GEMINI_FLASH_MODEL || 'gemini-2.5-flash' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
          GROQ_ISSUE_MODEL: ${{ secrets.GROQ_ISSUE_MODEL || 'llama-3.3-70b-versatile' }}
          GROQ_MAX_ISSUE_SUMMARIES: ${{ secrets.GROQ_MAX_ISSUE_SUMMARIES || '20' }}
          AI_MAX_ISSUE_SUMMARIES: ${{ secrets.AI_MAX_ISSUE_SUMMARIES || '5' }}
          AI_ISSUE_SUMMARY_PROVIDER: gemini
          REQUIRE_DASHBOARD_HISTORY: "true"
          REQUIRE_DASHBOARD_QUALITY: "false"

      - name: Configure GitHub Pages
        if: steps.guard.outputs.should_run == 'true' && (github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_only != 'true'))
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.guard.outputs.should_run == 'true' && (github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_only != 'true'))
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.guard.outputs.should_run == 'true' && (github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_only != 'true'))
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Slack report link
        if: steps.guard.outputs.should_run == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.backfill_only != 'true') && ((github.event_name == 'schedule' && steps.guard.outputs.should_period != 'true') || (github.event_name == 'workflow_dispatch' && github.event.inputs.period_reports == 'none' && github.event.inputs.send_slack == 'true') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[send-slack]')))
        run: python slack_notify.py daily
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_REPORT_WEBHOOK_URL: ${{ secrets.SLACK_REPORT_WEBHOOK_URL }}
          SLACK_AI_USAGE_WEBHOOK_URL: ${{ secrets.SLACK_AI_USAGE_WEBHOOK_URL }}
          REPORT_SLOT: ${{ steps.guard.outputs.kst_hour }}
          REPORT_PUBLIC_URL: ${{ steps.deployment.outputs.page_url }}
          FORCE_SLACK_SEND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_slack_send == 'true' && '1' || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      - name: Send period Slack report link
        if: steps.guard.outputs.should_run == 'true' && (steps.guard.outputs.should_period == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.period_reports != 'none' && github.event.inputs.send_slack == 'true'))
        run: |
          PERIOD="${{ github.event.inputs.period_reports }}"
          REPORT_MONTH="${{ github.event.inputs.report_month }}"

          if [ "${{ steps.guard.outputs.should_period }}" = "true" ] && [ "$(TZ=Asia/Seoul date +%u)" = "1" ]; then
            python slack_notify.py period weekly
          fi
          if [ "${{ steps.guard.outputs.should_period }}" = "true" ] && [ "$(TZ=Asia/Seoul date +%d)" = "01" ]; then
            python slack_notify.py period monthly
          fi
          if [ "$PERIOD" = "weekly" ] || [ "$PERIOD" = "both" ]; then
            python slack_notify.py period weekly
          fi
          if [ "$PERIOD" = "monthly" ] || [ "$PERIOD" = "both" ]; then
            if [ -n "$REPORT_MONTH" ]; then
              python slack_notify.py period monthly "$REPORT_MONTH"
            else
              python slack_notify.py period monthly
            fi
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_REPORT_WEBHOOK_URL: ${{ secrets.SLACK_REPORT_WEBHOOK_URL }}
          REPORT_PUBLIC_URL: ${{ steps.deployment.outputs.page_url }}
          FORCE_SLACK_SEND: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_slack_send == 'true' && '1' || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_PUBLISHABLE_KEY || secrets.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      - name: Persist run archive
        if: steps.guard.outputs.should_run == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[send-slack]'))
        run: |
          if [ "${{ steps.guard.outputs.should_mark }}" = "true" ]; then
            python schedule_guard.py mark "${{ steps.guard.outputs.marker_path }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.guard.outputs.should_period }}" != "true" ]; then
            git add -f data/daily
          fi
          if [ -d period_reports ]; then
            git add -f period_reports
          fi
          if [ -d .run-state ]; then
            git add -f .run-state
          fi
          if git diff --cached --quiet; then
            echo "No archive changes to commit."
            exit 0
          fi
          git commit -m "Archive briefing data"
          if ! git diff --quiet || [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            git stash push --include-untracked -m "generated files before archive push"
          fi
          git pull --rebase
          git push

      - name: Record report finish
        if: always() && steps.guard.outputs.should_run == 'true' && steps.guard.outputs.kst_hour != 'manual' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: python job_ledger.py report finish --status "$JOB_STATUS"
        env:
          REPORT_SLOT: ${{ steps.guard.outputs.kst_hour }}
          REPORT_BACKFILL_ONLY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_only == 'true' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOB_PROVIDER: github_actions
          JOB_STATUS: ${{ job.status }}
