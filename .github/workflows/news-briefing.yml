name: AI News Briefing

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - ".run-state/**"
  schedule:
    - cron: "5 23 * * *" # 08:05 KST
    - cron: "15 23 * * *" # 08:15 KST backup
    - cron: "30 23 * * *" # 08:30 KST backup
    - cron: "45 23 * * *" # 08:45 KST backup
    - cron: "5 4 * * *"  # 13:05 KST
    - cron: "15 4 * * *"  # 13:15 KST backup
    - cron: "30 4 * * *"  # 13:30 KST backup
    - cron: "45 4 * * *"  # 13:45 KST backup
    - cron: "5 8 * * *"  # 17:05 KST
    - cron: "15 8 * * *"  # 17:15 KST backup
    - cron: "30 8 * * *"  # 17:30 KST backup
    - cron: "45 8 * * *"  # 17:45 KST backup
    - cron: "5 9 * * *"  # 18:05 KST
    - cron: "15 9 * * *"  # 18:15 KST backup
    - cron: "30 9 * * *"  # 18:30 KST backup
    - cron: "45 9 * * *"  # 18:45 KST backup

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check schedule slot
        id: guard
        run: python schedule_guard.py begin
        env:
          SCHEDULE_CRON: ${{ github.event.schedule }}

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Generate briefing
        if: steps.guard.outputs.should_run == 'true'
        run: python run_once.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Prepare static report
        if: steps.guard.outputs.should_run == 'true'
        run: python publish_report.py

      - name: Configure GitHub Pages
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.guard.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.guard.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send KakaoTalk link
        if: steps.guard.outputs.should_run == 'true'
        run: python kakao_report_send.py
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          REPORT_PUBLIC_URL: ${{ steps.deployment.outputs.page_url }}

      - name: Mark scheduled slot
        if: steps.guard.outputs.should_mark == 'true' && steps.guard.outputs.should_run == 'true'
        run: |
          python schedule_guard.py mark "${{ steps.guard.outputs.marker_path }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.guard.outputs.marker_path }}"
          git commit -m "Mark briefing slot ${{ steps.guard.outputs.marker_path }}"
          git push
