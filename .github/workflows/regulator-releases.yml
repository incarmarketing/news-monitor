name: Regulator Releases Backfill

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback days for official regulator releases"
        required: false
        default: "45"
      pages:
        description: "Maximum list pages per regulator"
        required: false
        default: "10"
  push:
    branches:
      - main
    paths:
      - "regulator_collector.py"
      - "refresh_regulator_releases.py"
      - ".github/workflows/regulator-releases.yml"
  schedule:
    - cron: "30 22 * * *" # 07:30 KST

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGULATOR_BACKFILL_DAYS: ${{ github.event.inputs.days || '45' }}
  REGULATOR_BACKFILL_PAGES: ${{ github.event.inputs.pages || '10' }}

concurrency:
  group: regulator-releases-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh official regulator releases
        run: python refresh_regulator_releases.py --days "$REGULATOR_BACKFILL_DAYS" --pages "$REGULATOR_BACKFILL_PAGES"
        env:
          FSS_API_AUTH_KEY: ${{ secrets.FSS_API_AUTH_KEY }}
          FSS_OPENAPI_AUTH_KEY: ${{ secrets.FSS_OPENAPI_AUTH_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
