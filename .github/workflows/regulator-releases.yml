name: Regulator Releases Backfill

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "regulator_collector.py"
      - "refresh_regulator_releases.py"
      - ".github/workflows/regulator-releases.yml"
  schedule:
    - cron: "30 22 * * *" # 07:30 KST

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: regulator-releases-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Backfill official regulator releases
        run: python refresh_regulator_releases.py --days 183 --pages 120
        env:
          FSS_API_AUTH_KEY: ${{ secrets.FSS_API_AUTH_KEY }}
          FSS_OPENAPI_AUTH_KEY: ${{ secrets.FSS_OPENAPI_AUTH_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.PUBLIC_SUPABASE_URL || 'https://moszekksbhprhevxdynb.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
